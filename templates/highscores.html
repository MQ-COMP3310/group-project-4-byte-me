{% extends 'base.html' %} {% block content %}
<div class="container base-content">
    <div class="row">
        <div class="col text-center">
            <br>
            <h3 class="text-center">HIGHSCORE BOARD</h3>
            <div class="">
                <table class="table table-striped table-bordered table-hover">
                    <thead class="thead-dark">
                        <tr>
                            <th>Rank</th>
                            <th>Username</th>
                            <th>Score</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for entry in usernames_and_scores %}
                        <tr>
                            <th scope="row"> {{ loop.index }}</th>
                            <td> {{ entry[0] }} </td>
                            <td> {{ entry[1] }} </td>
                        </tr>
                        {% endfor %}
                        {% if not usernames_and_scores %}
                        <tr>
                            <td colspan="3" class="text-center">No scores yet. Be the first to play!</td>
                        </tr>
                        {% endif %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
